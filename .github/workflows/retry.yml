on:
  workflow_run:
    workflows: [Integration Tests]
    types:
      - completed

permissions:
  actions: write

jobs:
  retry:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Re-run Workflow
        if: ${{ contains(fromJSON('["failure", "timed_out"]'), github.event.workflow_run.conclusion) && github.event.workflow_run.run_attempt < 5 && github.event.workflow_run.event != 'workflow_dispatch' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
        with:
          script: |
            console.log("Retrying run.");
            github.request("POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun-failed-jobs", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: process.env.RUN_ID,
            });
